<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:;">
  <title>调试工具</title>
  <link rel="stylesheet" href="./debugger-assets/rrweb-player.css">
  <link rel="stylesheet" href="./debugger-assets/rrweb-replay.css">
  <script src="./debugger-assets/tailwind.browser.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #replayer { width: 100%; height: 100%; min-height: 0; overflow: hidden; }
    #replayer .rr-player { width: 100% !important; height: 100% !important; display: flex !important; flex-direction: column !important; }
    #replayer .rr-player__frame { width: 100% !important; flex: 1 !important; min-height: 0 !important; height: auto !important; overflow: hidden; }
    #replayer .rr-player__frame > div { width: 100% !important; height: 100% !important; }
    #replayer .rr-player__controller { flex-shrink: 0; position: relative; }

    .resizer { width: 4px; background: #2a2a4a; cursor: col-resize; transition: background 0.15s; flex-shrink: 0; }
    .resizer:hover, .resizer.dragging { background: #6366f1; }

    .event-list::-webkit-scrollbar { width: 4px; }
    .event-list::-webkit-scrollbar-track { background: transparent; }
    .event-list::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

    webview { width: 100%; height: 100%; flex: 1; }
  </style>
</head>
<body>
<div id="app">
  <!-- 标题栏 -->
  <div class="flex items-center justify-between h-9 px-3 bg-[#16162a]" style="-webkit-app-region: drag; user-select: none;">
    <span class="text-[13px] font-medium">调试工具</span>
    <div class="flex gap-2" style="-webkit-app-region: no-drag;">
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#febc2e] hover:opacity-80" @click="doMinimize"></button>
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#28c840] hover:opacity-80" @click="doMaximize"></button>
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#ff5f57] hover:opacity-80" @click="doClose"></button>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="px-4 py-2 bg-[#1e1e3a] border-b border-[#2a2a4a] flex flex-wrap items-center gap-2">
    <select v-model="targetId"
      class="bg-[#2a2a4a] text-[#e0e0e0] border border-[#3a3a5a] rounded px-2 py-1 text-xs outline-none focus:border-indigo-500 min-w-[200px]">
      <option value="">-- 选择目标页面 --</option>
      <option value="__embedded__">内嵌 WebView</option>
      <option v-for="tab in tabs" :key="tab.webContentsId" :value="String(tab.webContentsId)">
        {{ tab.title }} (ID: {{ tab.webContentsId }})
      </option>
    </select>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="canStart ? 'bg-green-500 text-white' : 'bg-green-500/40 text-white cursor-not-allowed'"
      :disabled="!canStart" @click="startRecording">注入并录制</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="isRecording ? 'bg-red-500 text-white' : 'bg-red-500/40 text-white cursor-not-allowed'"
      :disabled="!isRecording" @click="stopRecording">停止录制</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="canExport ? 'bg-blue-500 text-white' : 'bg-blue-500/40 text-white cursor-not-allowed'"
      :disabled="!canExport" @click="exportEvents">导出</button>
    <span class="text-[11px] ml-1" :class="isRecording ? 'text-red-400' : 'text-slate-400'">{{ statusText }}</span>

    <!-- URL 输入 -->
    <div v-if="showUrlBar" class="w-full flex gap-2 items-center">
      <input type="text" v-model="urlInput" placeholder="输入 URL..."
        class="flex-1 min-w-[150px] bg-[#2a2a4a] text-[#e0e0e0] border border-[#3a3a5a] rounded px-2 py-1 text-xs outline-none focus:border-indigo-500"
        @keydown.enter="loadUrl">
      <button class="px-3 py-1 rounded border-none text-xs font-medium cursor-pointer bg-indigo-500 text-white hover:opacity-85" @click="loadUrl">加载</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="flex flex-1 overflow-hidden" style="height: calc(100vh - 36px - 44px);">
    <!-- 左侧面板 -->
    <div class="flex-1 flex flex-col min-w-[300px] overflow-hidden" ref="leftPanel">
      <div class="flex bg-[#1e1e3a] border-b border-[#2a2a4a]">
        <button v-for="t in ['record', 'replay']" :key="t"
          class="flex-1 py-2 text-center text-xs cursor-pointer border-none transition-all"
          :class="activeTab === t ? 'text-indigo-400 border-b-2 border-indigo-500 bg-[#2a2a4a]' : 'text-slate-400 bg-transparent hover:text-[#e0e0e0] hover:bg-[#2a2a4a]'"
          @click="activeTab = t">{{ t === 'record' ? '录制' : '回放' }}</button>
      </div>

      <!-- 录制 Tab -->
      <div v-show="activeTab === 'record'" class="flex-1 flex flex-col overflow-hidden">
        <div v-if="showUrlBar" class="flex-1 flex min-h-0">
          <webview ref="webviewEl" src="about:blank"></webview>
        </div>
      </div>

      <!-- 回放 Tab -->
      <div v-show="activeTab === 'replay'" class="flex-1 flex overflow-hidden relative min-h-0">
        <span v-if="allEvents.length === 0" class="text-slate-500 text-sm absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
          {{ replayHint }}
        </span>
        <div v-show="allEvents.length > 0" id="replayer" ref="replayerEl"></div>
      </div>
    </div>

    <!-- 拖拽分隔条 -->
    <div class="resizer" :class="{ dragging: isResizing }"
      @mousedown.prevent="startResize"></div>

    <!-- 右侧面板：事件列表 -->
    <div class="bg-[#1e1e3a] flex flex-col overflow-hidden" :style="{ width: rightWidth + 'px' }" ref="rightPanel">
      <div class="px-3 py-2 text-xs font-semibold border-b border-[#2a2a4a] flex items-center justify-between">
        交互记录 <span class="text-indigo-400 font-normal">{{ allEvents.length }}</span>
      </div>
      <div class="flex-1 overflow-y-auto py-1 event-list" ref="eventListEl">
        <div v-if="allEvents.length === 0" class="flex items-center justify-center h-full text-slate-600 text-xs">暂无事件</div>
        <div v-for="(ev, i) in allEvents" :key="i"
          class="px-3 py-1 text-[11px] font-mono border-l-2 cursor-default flex items-center gap-1.5 hover:bg-[#2a2a4a]"
          :class="activeEventIndex === i ? 'bg-[#2a2a5a] border-l-indigo-500' : 'border-l-transparent'"
          @click="goToEvent(i)">
          <span class="text-slate-500 min-w-[28px] text-right">{{ i + 1 }}</span>
          <span class="inline-block px-[5px] py-[1px] rounded text-[10px] font-medium"
            :class="eventBadgeClass(ev)">{{ eventLabel(ev) }}</span>
          <span class="text-slate-600 ml-auto text-[10px]">{{ formatTs(ev.timestamp) }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./debugger-assets/vue.global.prod.js"></script>
<script src="./debugger-assets/rrweb-player.js"></script>
<script>
const { createApp, ref, reactive, computed, watch, onMounted, nextTick } = Vue

createApp({
  setup() {
    const api = window.debuggerApi
    const EMBEDDED = '__embedded__'

    const targetId = ref('')
    const tabs = ref([])
    const isRecording = ref(false)
    const statusText = ref('就绪')
    const allEvents = ref([])
    const activeEventIndex = ref(-1)
    const activeTab = ref('record')
    const urlInput = ref('https://baidu.com')
    const rightWidth = ref(280)
    const isResizing = ref(false)
    const replayHint = ref('停止录制后自动回放')
    const playerInstance = ref(null)

    const webviewEl = ref(null)
    const replayerEl = ref(null)
    const eventListEl = ref(null)
    const leftPanel = ref(null)
    const rightPanel = ref(null)

    let currentWcId = null
    let embeddedWcId = null

    const showUrlBar = computed(() => targetId.value === EMBEDDED || targetId.value === '')
    const canStart = computed(() => currentWcId !== null && !isRecording.value)
    const canExport = computed(() => !isRecording.value && allEvents.value.length > 0)

    // 窗口控制
    function doMinimize() { api.minimize() }
    function doMaximize() { api.maximize() }
    function doClose() { api.close() }

    // Tabs
    async function refreshTabs() {
      const list = await api.getTabs()
      tabs.value = list
    }

    watch(targetId, (val) => {
      if (val === EMBEDDED) {
        currentWcId = embeddedWcId
      } else if (val) {
        currentWcId = parseInt(val, 10)
      } else {
        currentWcId = embeddedWcId
      }
    })

    // 录制控制
    async function startRecording() {
      if (!currentWcId) return
      statusText.value = '注入中...'
      const injectResult = await api.inject(currentWcId)
      if (!injectResult.success) {
        statusText.value = '注入失败: ' + (injectResult.error || '未知错误')
        return
      }
      statusText.value = '开始录制...'
      allEvents.value = []
      activeEventIndex.value = -1
      const r = await api.startRecord(currentWcId)
      if (r.success) {
        isRecording.value = true
        statusText.value = '录制中...'
        activeTab.value = 'record'
      } else {
        statusText.value = '录制失败: ' + (r.error || '未知错误')
      }
    }

    async function stopRecording() {
      if (!currentWcId) return
      const r = await api.stopRecord(currentWcId)
      if (r.success) {
        isRecording.value = false
        const events = await api.getEvents(currentWcId)
        allEvents.value = events
        statusText.value = '已停止 (' + events.length + ' 事件)'
        if (events.length > 0) {
          playEvents(events)
          activeTab.value = 'replay'
        } else {
          replayHint.value = '无录制事件'
        }
      } else {
        statusText.value = '停止失败: ' + (r.error || '未知错误')
      }
    }

    async function exportEvents() {
      if (!currentWcId) return
      const r = await api.exportEvents(currentWcId)
      statusText.value = r.success ? '已导出: ' + r.path : '导出失败: ' + (r.error || '未知错误')
    }

    function loadUrl() {
      const url = urlInput.value.trim()
      if (url && webviewEl.value) webviewEl.value.loadURL(url)
    }

    function goToEvent(index) {
      if (playerInstance.value && playerInstance.value.emit) {
        playerInstance.value.emit('goTo', index)
      }
    }

    // 拖拽分隔条
    function startResize() {
      isResizing.value = true
      const onMove = (e) => {
        const container = leftPanel.value?.parentElement
        if (!container) return
        const rect = container.getBoundingClientRect()
        const rw = rect.right - e.clientX
        rightWidth.value = Math.max(180, Math.min(rw, rect.width * 0.7))
      }
      const onUp = () => {
        isResizing.value = false
        document.removeEventListener('mousemove', onMove)
        document.removeEventListener('mouseup', onUp)
        document.body.style.cursor = ''
        document.body.style.userSelect = ''
      }
      document.body.style.cursor = 'col-resize'
      document.body.style.userSelect = 'none'
      document.addEventListener('mousemove', onMove)
      document.addEventListener('mouseup', onUp)
    }

    // 事件标签
    function eventLabel(ev) {
      const t = ev.type
      if (t === 3 && ev.data) {
        const src = ev.data.source
        const map = { 0:'mutation', 1:'mousemove', 2:'mouseinteraction', 3:'scroll', 4:'viewportresize', 5:'input', 6:'touchmove', 7:'mediainteraction', 8:'stylesheetrule', 9:'canvasmutation', 10:'font', 11:'log', 12:'drag', 13:'styledeclaration', 14:'selection', 15:'adoptedstylesheet', 16:'custom' }
        const label = map[src] || 'Incremental'
        if (src === 2 && ev.data.type !== undefined) {
          const im = { 0:'mouseup', 1:'mousedown', 2:'click', 3:'contextmenu', 4:'dblclick', 5:'focus', 6:'blur', 7:'touchstart', 8:'touchmove', 9:'touchend' }
          return im[ev.data.type] || label
        }
        if (src === 5 && ev.data.tagName) return 'input(' + ev.data.tagName.toLowerCase() + ')'
        if (src === 3) return 'scroll'
        if (src === 11 && ev.data.level) {
          const lm = { 0:'log', 1:'warn', 2:'error' }
          return (lm[ev.data.level] || 'log') + (ev.data.payload ? ': ' + String(ev.data.payload[0] || '').slice(0, 30) : '')
        }
        return label
      }
      if (t === 4) return 'meta'
      if (t === 0) return 'domcontentloaded'
      if (t === 1) return 'load'
      return 'Type' + t
    }

    function eventBadgeClass(ev) {
      if (ev.type === 2) return 'bg-green-500/10 text-green-400'
      if (ev.type === 4) return 'bg-purple-500/10 text-purple-400'
      if (ev.type === 5) return 'bg-amber-500/10 text-amber-400'
      if (ev.type === 3 && ev.data) {
        const s = ev.data.source
        if (s === 2 || s === 3 || s === 5 || s === 6) return 'bg-pink-500/10 text-pink-400'
        if (s === 11) return 'bg-slate-500/10 text-slate-400'
      }
      return 'bg-blue-500/10 text-blue-400'
    }

    function formatTs(ts) {
      const d = new Date(ts)
      return d.getMinutes().toString().padStart(2, '0') + ':' +
             d.getSeconds().toString().padStart(2, '0') + '.' +
             d.getMilliseconds().toString().padStart(3, '0').slice(0, 2)
    }

    // 回放
    function playEvents(events) {
      nextTick(() => {
        requestAnimationFrame(() => {
          const el = replayerEl.value
          if (!el) return
          el.innerHTML = ''
          const rect = el.getBoundingClientRect()
          const w = Math.max(rect.width, 300)
          const h = Math.max(rect.height, 200)
          try {
            playerInstance.value = new rrwebPlayer({
              target: el,
              props: { events, width: w, height: h, autoPlay: true, showController: true }
            })
            bindReplayHighlight(playerInstance.value, events)
          } catch (err) {
            replayHint.value = '回放失败: ' + err.message
          }
        })
      })
    }

    function bindReplayHighlight(player, events) {
      const updateActive = (idx) => {
        if (idx < 0 || idx === activeEventIndex.value) return
        activeEventIndex.value = idx
        // 自动滚动事件列表
        const listEl = eventListEl.value
        if (listEl) {
          const active = listEl.children[1 + idx] // skip empty hint
          if (active) active.scrollIntoView({ block: 'nearest', behavior: 'auto' })
        }
      }
      const findById = (castEvent) => {
        if (!castEvent) return -1
        for (let i = 0; i < events.length; i++) {
          if (events[i].timestamp === castEvent.timestamp && events[i].type === castEvent.type) return i
        }
        return -1
      }
      const findByTime = (timeMs) => {
        const base = events[0]?.timestamp || 0
        const target = base + timeMs
        for (let i = events.length - 1; i >= 0; i--) {
          if (events[i].timestamp <= target) return i
        }
        return 0
      }
      const castHandler = (ev) => updateActive(findById(ev))

      const replayer = typeof player.getReplayer === 'function' ? player.getReplayer() : player.replayer
      if (replayer && typeof replayer.on === 'function') replayer.on('event-cast', castHandler)
      if (typeof player.on === 'function') {
        player.on('event-cast', castHandler)
        player.on('ui-update-current-time', (time) => updateActive(findByTime(time)))
      }
      if (typeof player.addEventListener === 'function') {
        player.addEventListener('event-cast', castHandler)
        player.addEventListener('ui-update-current-time', (time) => updateActive(findByTime(time)))
      }
    }

    // 实时事件推送
    api.on('debugger:event', (event) => {
      if (!isRecording.value) return
      allEvents.value.push(event)
    })

    api.on('debugger:load-url', (url) => {
      if (webviewEl.value) webviewEl.value.loadURL(url)
    })

    onMounted(async () => {
      await refreshTabs()
      targetId.value = EMBEDDED

      // webview did-finish-load
      const wv = webviewEl.value
      if (wv) {
        wv.addEventListener('did-finish-load', () => {
          embeddedWcId = wv.getWebContentsId?.() ?? null
          if (targetId.value === EMBEDDED || !targetId.value) {
            currentWcId = embeddedWcId
          }
        })
        const url = urlInput.value.trim()
        if (url) wv.loadURL(url)
      }
    })

    return {
      targetId, tabs, isRecording, statusText, allEvents, activeEventIndex,
      activeTab, urlInput, rightWidth, isResizing, replayHint,
      webviewEl, replayerEl, eventListEl, leftPanel, rightPanel,
      showUrlBar, canStart, canExport,
      doMinimize, doMaximize, doClose, startRecording, stopRecording,
      exportEvents, loadUrl, goToEvent, startResize,
      eventLabel, eventBadgeClass, formatTs
    }
  }
}).mount('#app')
</script>
</body>
</html>
