<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:;">
  <title>动作录制与复原</title>
  <script src="./debugger-assets/tailwind.browser.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #141827; color: #e5e7eb; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
    #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    webview { width: 100%; height: 100%; flex: 1; background: #0f172a; }
    .resizer { width: 4px; background: #27324a; cursor: col-resize; transition: background 0.15s; flex-shrink: 0; }
    .resizer:hover, .resizer.dragging { background: #38bdf8; }
    .step-list::-webkit-scrollbar { width: 5px; }
    .step-list::-webkit-scrollbar-track { background: transparent; }
    .step-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    .step-checkbox {
      appearance: none; -webkit-appearance: none;
      width: 12px; height: 12px; border: 1px solid #64748b; border-radius: 3px;
      background: transparent; cursor: pointer; flex-shrink: 0; position: relative;
    }
    .step-checkbox:checked { background: #38bdf8; border-color: #38bdf8; }
    .step-checkbox:checked::after {
      content: ''; position: absolute; left: 3px; top: 0px;
      width: 4px; height: 7px; border: solid #0f172a; border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="flex items-center justify-between h-9 px-3 bg-[#0f172a] border-b border-slate-800" style="-webkit-app-region: drag; user-select: none;">
    <span class="text-[13px] font-medium">动作录制与复原</span>
    <div class="flex gap-2" style="-webkit-app-region: no-drag;">
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#febc2e] hover:opacity-80" @click="doMinimize"></button>
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#28c840] hover:opacity-80" @click="doMaximize"></button>
      <button class="w-3 h-3 rounded-full border-none cursor-pointer bg-[#ff5f57] hover:opacity-80" @click="doClose"></button>
    </div>
  </div>

  <div class="px-4 py-2 bg-[#172033] border-b border-slate-800 flex flex-wrap items-center gap-2">
    <select v-model="targetId"
      class="bg-slate-800 text-slate-100 border border-slate-700 rounded px-2 py-1 text-xs outline-none focus:border-sky-400 min-w-[220px]">
      <option value="">-- 选择录制页面 --</option>
      <option value="__embedded__">内嵌 WebView</option>
      <option v-for="tab in tabs" :key="tab.webContentsId" :value="String(tab.webContentsId)">
        {{ tab.title }} (ID: {{ tab.webContentsId }})
      </option>
    </select>

    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="canStart ? 'bg-emerald-500 text-white' : 'bg-emerald-500/35 text-white cursor-not-allowed'"
      :disabled="!canStart" @click="startRecording">注入并录制</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="isRecording ? 'bg-rose-500 text-white' : 'bg-rose-500/35 text-white cursor-not-allowed'"
      :disabled="!isRecording" @click="stopRecording">停止录制</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="canPlay ? 'bg-sky-500 text-white' : 'bg-sky-500/35 text-white cursor-not-allowed'"
      :disabled="!canPlay" @click="startPlay">开始复原</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="isPlaying ? 'bg-amber-500 text-slate-950' : 'bg-amber-500/35 text-white cursor-not-allowed'"
      :disabled="!isPlaying" @click="stopPlay">停止复原</button>
    <button class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer transition-opacity hover:opacity-85"
      :class="canExport ? 'bg-indigo-500 text-white' : 'bg-indigo-500/35 text-white cursor-not-allowed'"
      :disabled="!canExport" @click="exportRun">导出动作</button>
    <button v-if="selectedSteps.size > 0"
      class="px-3 py-[5px] rounded border-none text-xs font-medium cursor-pointer bg-slate-700 text-slate-100 hover:opacity-85"
      @click="copySelected">复制选中 ({{ selectedSteps.size }})</button>

    <span class="text-[11px] ml-1" :class="statusClass">{{ statusText }}</span>

    <div class="w-full flex gap-2 items-center">
      <input type="text" v-model="urlInput" placeholder="输入录制 WebView URL..."
        class="flex-1 min-w-[180px] bg-slate-800 text-slate-100 border border-slate-700 rounded px-2 py-1 text-xs outline-none focus:border-sky-400"
        @keydown.enter="loadUrl">
      <button class="px-3 py-1 rounded border-none text-xs font-medium cursor-pointer bg-emerald-500 text-white hover:opacity-85" @click="loadUrl">加载录制页</button>
    </div>
  </div>

  <div class="flex flex-1 min-h-0 overflow-hidden">
    <div class="flex-1 flex flex-col min-w-[320px] overflow-hidden" ref="leftPanel">
      <div class="flex bg-[#172033] border-b border-slate-800">
        <button
          class="flex-1 py-2 text-center text-xs cursor-pointer border-none transition-all"
          :class="activeView === 'record' ? 'text-emerald-300 border-b-2 border-emerald-400 bg-slate-800' : 'text-slate-500 bg-transparent hover:text-slate-200 hover:bg-slate-800/60'"
          @click="activeView = 'record'">录制 WebView</button>
        <button
          class="flex-1 py-2 text-center text-xs cursor-pointer border-none transition-all"
          :class="activeView === 'play' ? 'text-sky-300 border-b-2 border-sky-400 bg-slate-800' : 'text-slate-500 bg-transparent hover:text-slate-200 hover:bg-slate-800/60'"
          @click="ensurePlayWebview">复原 WebView</button>
      </div>
      <div class="flex-1 min-h-0 overflow-hidden">
        <div v-show="activeView === 'record'" class="h-full flex flex-col min-h-0">
          <webview ref="recordWebviewEl" :partition="recordPartition" src="about:blank"></webview>
        </div>
        <div v-if="playWebviewMounted" v-show="activeView === 'play'" class="h-full flex flex-col min-h-0">
          <webview ref="playWebviewEl" :partition="playPartition" :src="playInitialSrc"></webview>
        </div>
      </div>
    </div>

    <div class="resizer" :class="{ dragging: isResizing }" @mousedown.prevent="startResize"></div>

    <div class="bg-[#172033] flex flex-col overflow-hidden" :style="{ width: rightWidth + 'px' }" ref="rightPanel">
      <div class="px-3 py-2 text-xs font-semibold border-b border-slate-800 flex items-center justify-between">
        <span>动作步骤 <span class="text-sky-400 font-normal">{{ steps.length }}</span></span>
        <button v-if="steps.length > 0"
          class="px-2 py-0.5 rounded text-[10px] bg-slate-700 text-slate-100 border-none cursor-pointer hover:opacity-85"
          @click="toggleAllVisible">{{ allSelected ? '取消全选' : '全选' }}</button>
      </div>

      <div class="flex-1 overflow-y-auto py-1 step-list" ref="stepListEl">
        <div v-if="steps.length === 0" class="flex items-center justify-center h-full text-slate-600 text-xs px-6 text-center">
          暂无动作。选择页面后点击“注入并录制”，操作网页即可看到高层步骤。
        </div>

        <div v-for="(step, index) in steps" :key="step.id"
          class="px-3 py-2 text-[11px] border-l-2 flex gap-2 hover:bg-slate-800/70"
          :class="stepRowClass(step, index)"
          @click="activeStepIndex = index">
          <input type="checkbox" class="step-checkbox mt-0.5"
            :checked="selectedSteps.has(index)"
            @click.stop="toggleStep(index)" />
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1.5 min-w-0">
              <span class="text-slate-500 min-w-[26px] text-right">{{ index + 1 }}</span>
              <span class="inline-block px-[6px] py-[1px] rounded text-[10px] font-medium" :class="typeBadgeClass(step.type)">{{ step.type }}</span>
              <span class="ml-auto text-[10px]" :class="resultTextClass(index)">{{ resultLabel(index) }}</span>
            </div>
            <div class="mt-1 text-slate-300 truncate">{{ locatorSummary(step) }}</div>
            <div v-if="payloadSummary(step)" class="mt-0.5 text-slate-500 truncate">{{ payloadSummary(step) }}</div>
            <div class="mt-0.5 text-slate-600 truncate">{{ step.url }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./debugger-assets/vue.global.prod.js"></script>
<script>
const { createApp, ref, reactive, computed, watch, onMounted, nextTick } = Vue

createApp({
  setup() {
    const api = window.debuggerApi
    const EMBEDDED = '__embedded__'
    const EMBEDDED_PARTITION = 'persist:debugger-embedded'

    const targetId = ref('')
    const tabs = ref([])
    const currentWcId = ref(null)
    const recordWcId = ref(null)
    const playWcId = ref(null)
    const targetRun = ref(null)
    const steps = ref([])
    const results = ref([])
    const activeStepIndex = ref(-1)
    const activePlayId = ref(null)
    const activeView = ref('record')
    const playStatus = ref('idle')
    const isRecording = ref(false)
    const statusText = ref('就绪')
    const urlInput = ref('https://baidu.com')
    const rightWidth = ref(360)
    const isResizing = ref(false)
    const recordPartition = ref(EMBEDDED_PARTITION)
    const playPartition = ref('persist:debugger-action-play')
    const playWebviewMounted = ref(false)
    const playInitialSrc = ref('about:blank')
    const selectedSteps = reactive(new Set())

    const recordWebviewEl = ref(null)
    const playWebviewEl = ref(null)
    const leftPanel = ref(null)
    const stepListEl = ref(null)

    const canStart = computed(() => currentWcId.value !== null && !isRecording.value)
    const canExport = computed(() => !isRecording.value && steps.value.length > 0)
    const isPlaying = computed(() => playStatus.value === 'running')
    const canPlay = computed(() => !isRecording.value && !isPlaying.value && steps.value.length > 0)
    const allSelected = computed(() => steps.value.length > 0 && steps.value.every((_, i) => selectedSteps.has(i)))
    const statusClass = computed(() => {
      if (isRecording.value) return 'text-rose-400'
      if (isPlaying.value) return 'text-sky-400'
      if (playStatus.value === 'failed') return 'text-amber-400'
      return 'text-slate-400'
    })

    function doMinimize() { api.minimize() }
    function doMaximize() { api.maximize() }
    function doClose() { api.close() }

    async function refreshTabs() {
      tabs.value = await api.getTabs()
    }

    watch(targetId, async (val) => {
      if (val === EMBEDDED || val === '') {
        currentWcId.value = recordWcId.value || await api.getEmbeddedWcId()
      } else {
        currentWcId.value = parseInt(val, 10)
      }
    })

    async function startRecording() {
      if (!currentWcId.value) return
      statusText.value = '注入中...'
      const injectResult = await api.injectActionRecorder(currentWcId.value)
      if (!injectResult.success) {
        statusText.value = '注入失败: ' + (injectResult.error || '未知错误')
        return
      }

      steps.value = []
      results.value = []
      selectedSteps.clear()
      activeStepIndex.value = -1
      targetRun.value = null
      playStatus.value = 'idle'

      const result = await api.startActionRecord(currentWcId.value)
      if (result.success) {
        isRecording.value = true
        targetRun.value = result.run || null
        statusText.value = '录制中...'
      } else {
        statusText.value = '录制失败: ' + (result.error || '未知错误')
      }
    }

    async function stopRecording() {
      if (!currentWcId.value) return
      const result = await api.stopActionRecord(currentWcId.value)
      isRecording.value = false
      const run = result.run || await api.getActionRun(currentWcId.value)
      if (run) {
        targetRun.value = run
        steps.value = run.steps || []
        statusText.value = '已停止 (' + steps.value.length + ' 步动作)'
      } else {
        statusText.value = result.success ? '已停止，无动作' : '停止失败: ' + (result.error || '未知错误')
      }
    }

    async function exportRun() {
      if (!currentWcId.value) return
      const result = await api.exportActionRun(currentWcId.value)
      statusText.value = result.success ? '已导出: ' + result.path : '导出失败: ' + (result.error || '未知错误')
    }

    function toPlainJson(value) {
      return JSON.parse(JSON.stringify(value))
    }

    function runForPlay() {
      const run = targetRun.value || {}
      return toPlainJson({
        id: run.id || 'run_local_' + Date.now(),
        partition: run.partition || EMBEDDED_PARTITION,
        startedAt: run.startedAt || Date.now(),
        endedAt: run.endedAt || null,
        initialUrl: run.initialUrl || steps.value[0]?.url || urlInput.value,
        steps: steps.value
      })
    }

    function playStartUrl() {
      const run = targetRun.value || {}
      const firstNavigate = steps.value.find(step => step.type === 'navigate' && (step.payload?.url || step.url))
      return run.initialUrl || firstNavigate?.payload?.url || firstNavigate?.url || steps.value[0]?.url || urlInput.value || 'about:blank'
    }

    function ensurePlayWebview() {
      activeView.value = 'play'
      if (!playWebviewMounted.value) {
        playWebviewMounted.value = true
      }
      nextTick(() => {
        if (!playWebviewEl.value) return
        try {
          playWcId.value = playWebviewEl.value.getWebContentsId()
        } catch (error) {
          console.warn('[debugger] failed to read play wcId:', error)
        }
      })
    }

    function waitForPlayWebviewReady() {
      ensurePlayWebview()
      return new Promise((resolve) => {
        let attempts = 0
        const tick = () => {
          attempts++
          if (playWcId.value) {
            resolve(true)
            return
          }
          try {
            if (playWebviewEl.value) playWcId.value = playWebviewEl.value.getWebContentsId()
          } catch {}
          if (playWcId.value || attempts > 50) {
            resolve(!!playWcId.value)
            return
          }
          setTimeout(tick, 50)
        }
        nextTick(tick)
      })
    }

    function loadPlayStartUrl(url) {
      return new Promise((resolve) => {
        const view = playWebviewEl.value
        if (!view || !url || url === 'about:blank') {
          resolve(true)
          return
        }
        let settled = false
        const done = () => {
          if (settled) return
          settled = true
          view.removeEventListener('did-finish-load', done)
          view.removeEventListener('did-fail-load', done)
          resolve(true)
        }
        view.addEventListener('did-finish-load', done)
        view.addEventListener('did-fail-load', done)
        view.loadURL(url)
        setTimeout(done, 8000)
      })
    }

    async function startPlay() {
      if (steps.value.length === 0) return
      const ready = await waitForPlayWebviewReady()
      if (!ready || !playWcId.value) {
        statusText.value = '复原失败: 复原 WebView 未就绪'
        return
      }
      results.value = []
      playStatus.value = 'running'
      activeStepIndex.value = 0
      const startUrl = playStartUrl()
      statusText.value = '加载复原页...'
      await loadPlayStartUrl(startUrl)
      statusText.value = '复原执行中...'
      const result = await api.playActionRun(playWcId.value, runForPlay())
      if (!result.success) {
        playStatus.value = 'failed'
        statusText.value = '复原启动失败: ' + (result.error || '未知错误')
      }
    }

    async function stopPlay() {
      const result = await api.stopActionPlay(activePlayId.value || undefined)
      statusText.value = result.success ? '正在停止复原...' : '停止失败: ' + (result.error || '未知错误')
    }

    function loadUrl() {
      const url = urlInput.value.trim()
      if (url && recordWebviewEl.value) recordWebviewEl.value.loadURL(url)
    }

    function toggleStep(index) {
      selectedSteps.has(index) ? selectedSteps.delete(index) : selectedSteps.add(index)
    }

    function toggleAllVisible() {
      if (allSelected.value) {
        selectedSteps.clear()
      } else {
        steps.value.forEach((_, i) => selectedSteps.add(i))
      }
    }

    function copySelected() {
      const indices = Array.from(selectedSteps).sort((a, b) => a - b)
      const selected = indices.map(i => steps.value[i]).filter(Boolean)
      navigator.clipboard.writeText(JSON.stringify(toPlainJson(selected), null, 2)).then(() => {
        statusText.value = '已复制 ' + selected.length + ' 步动作'
      }).catch(() => {
        statusText.value = '复制失败'
      })
    }

    function locatorSummary(step) {
      if (!step.locator) return step.type === 'navigate' ? '导航到 ' + (step.payload?.url || step.url) : '无定位器'
      const l = step.locator
      if (l.testId) return 'data-testid=' + l.testId
      if (l.id) return '#' + l.id
      if (l.name) return (l.tag || '*') + '[name=' + l.name + ']'
      if (l.css) return l.css
      if (l.text) return (l.tag || '*') + ' text="' + l.text + '"'
      if (l.xpath) return l.xpath
      return l.tag || 'element'
    }

    function payloadSummary(step) {
      if (!step.payload) return ''
      if (step.type === 'input' || step.type === 'change') return 'value: ' + String(step.payload.value ?? '').slice(0, 80)
      if (step.type === 'scroll') return 'scroll: ' + Number(step.payload.x || 0) + ', ' + Number(step.payload.y || 0)
      if (step.type === 'keydown') return 'key: ' + step.payload.key
      if (step.type === 'hover') return 'hover'
      if (step.type === 'file') return 'files: ' + (Array.isArray(step.payload.files) ? step.payload.files.join(', ') : '')
      if (step.type === 'click') return 'button: ' + (step.payload.button ?? 0)
      return ''
    }

    function typeBadgeClass(type) {
      const map = {
        navigate: 'bg-cyan-500/15 text-cyan-300',
        click: 'bg-emerald-500/15 text-emerald-300',
        input: 'bg-fuchsia-500/15 text-fuchsia-300',
        change: 'bg-violet-500/15 text-violet-300',
        scroll: 'bg-amber-500/15 text-amber-300',
        keydown: 'bg-slate-500/20 text-slate-300',
        hover: 'bg-orange-500/15 text-orange-300',
        file: 'bg-lime-500/15 text-lime-300'
      }
      return map[type] || 'bg-slate-500/20 text-slate-300'
    }

    function resultFor(index) {
      return results.value.find(r => r.index === index)
    }

    function resultLabel(index) {
      const result = resultFor(index)
      if (!result) return index === activeStepIndex.value && isPlaying.value ? '执行中' : ''
      if (result.status === 'success') return '成功'
      if (result.status === 'failed') return result.error || '失败'
      return result.status
    }

    function resultTextClass(index) {
      const result = resultFor(index)
      if (!result) return 'text-slate-600'
      if (result.status === 'success') return 'text-emerald-400'
      if (result.status === 'failed') return 'text-rose-400'
      return 'text-slate-400'
    }

    function stepRowClass(step, index) {
      const result = resultFor(index)
      if (result?.status === 'failed') return 'border-l-rose-500 bg-rose-500/5'
      if (result?.status === 'success') return 'border-l-emerald-500'
      if (activeStepIndex.value === index) return 'border-l-sky-500 bg-sky-500/5'
      return 'border-l-transparent'
    }

    function startResize() {
      isResizing.value = true
      const overlay = document.createElement('div')
      overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;cursor:col-resize;'
      document.body.appendChild(overlay)
      const onMove = (event) => {
        const container = leftPanel.value?.parentElement
        if (!container) return
        const rect = container.getBoundingClientRect()
        const rw = rect.right - event.clientX
        rightWidth.value = Math.max(260, Math.min(rw, rect.width * 0.72))
      }
      const onUp = () => {
        isResizing.value = false
        overlay.remove()
        document.removeEventListener('mousemove', onMove)
        document.removeEventListener('mouseup', onUp)
      }
      document.addEventListener('mousemove', onMove)
      document.addEventListener('mouseup', onUp)
    }

    api.on('debugger:action-step', (step) => {
      if (!isRecording.value) return
      steps.value.push(step)
      if (targetRun.value) targetRun.value.steps = steps.value
      nextTick(() => {
        const el = stepListEl.value
        if (el) el.scrollTop = el.scrollHeight
      })
    })

    api.on('debugger:action-play-state', (state) => {
      activePlayId.value = state.playId || activePlayId.value
      playStatus.value = state.status
      activeStepIndex.value = typeof state.currentIndex === 'number' ? state.currentIndex : activeStepIndex.value
      results.value = state.results || []
      if (state.status === 'running') statusText.value = '复原执行中 ' + Math.max(0, state.currentIndex + 1) + '/' + state.total
      if (state.status === 'completed') statusText.value = '复原完成 (' + state.total + ' 步)'
      if (state.status === 'failed') statusText.value = '复原失败: ' + (state.error || '未知错误')
      if (state.status === 'stopped') statusText.value = '复原已停止'
    })

    api.on('debugger:embedded-wcid', (wcId) => {
      recordWcId.value = wcId
      if (targetId.value === EMBEDDED || !targetId.value) currentWcId.value = wcId
    })

    api.on('debugger:load-url', (url) => {
      if (recordWebviewEl.value) recordWebviewEl.value.loadURL(url)
    })

    onMounted(async () => {
      await refreshTabs()
      targetId.value = EMBEDDED
      recordWcId.value = await api.getEmbeddedWcId()
      currentWcId.value = recordWcId.value

      nextTick(() => {
        if (recordWebviewEl.value) {
          recordWebviewEl.value.addEventListener('dom-ready', async () => {
            try {
              const wcId = recordWebviewEl.value.getWebContentsId()
              recordWcId.value = wcId
              await api.setEmbeddedWcId(wcId)
              if (targetId.value === EMBEDDED || !targetId.value) currentWcId.value = wcId
            } catch (error) {
              console.warn('[debugger] failed to set record wcId:', error)
            }
          })
        }

        watch(playWebviewEl, (view) => {
          if (!view) return
          view.addEventListener('dom-ready', () => {
            try {
              playWcId.value = view.getWebContentsId()
            } catch (error) {
              console.warn('[debugger] failed to set play wcId:', error)
            }
          })
          try {
            playWcId.value = view.getWebContentsId()
          } catch (error) {
            console.warn('[debugger] failed to read play wcId:', error)
          }
        }, { immediate: true })
      })
    })

    return {
      targetId, tabs, currentWcId, recordWcId, playWcId, steps, results, activeStepIndex,
      activeView, playWebviewMounted, playInitialSrc,
